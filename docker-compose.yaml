version: "3.9"

services:
  # =========================
  # 🔥 OPENCLAW (MAIN SERVICE)
  # =========================
  openclaw:
    build:
      context: .
      args:
        - OPENCLAW_BETA=${OPENCLAW_BETA:-false}

    container_name: openclaw
    restart: unless-stopped

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    env_file:
      - .env

    environment:
      # =========================
      # CORE
      # =========================
      PORT: 18789
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=1024

      # =========================
      # FREE LLM (NVIDIA)
      # =========================
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}

      # =========================
      # SHARED DATABASES (Coolify internal)
      # =========================
      REDIS_URL: ${REDIS_URL}
      MONGODB_URI: ${MONGODB_URI}
      DATABASE_URL: ${DATABASE_URL}

      # =========================
      # STORAGE
      # =========================
      OPENCLAW_STATE_DIR: /data/.openclaw
      OPENCLAW_WORKSPACE: /data/workspace

      # =========================
      # 🔒 SAFETY (IMPORTANT)
      # =========================
      DOCKER_HOST: ""
      SANDBOX_CONTAINER: "false"

      # =========================
      # 💰 TOKEN OPTIMIZATION
      # =========================
      AGENTS_DEFAULTS_BOOTSTRAP_MAX_CHARS: 3000
      AGENTS_DEFAULTS_CONTEXT_WINDOW_THRESHOLD: 0.5

      # =========================
      # 🧠 LOOP CONTROL
      # =========================
      MAX_ITERATIONS: 4
      MAX_TOOL_CALLS: 6

      # =========================
      # 🌐 PUBLIC ACCESS
      # =========================
      BASE_URL: https://${SERVICE_FQDN_OPENCLAW}
      PUBLIC_URL: https://${SERVICE_FQDN_OPENCLAW}

      # =========================
      # ⚙️ STABILITY FIXES
      # =========================
      CHOKIDAR_USEPOLLING: "true"

      # =========================
      # 🤖 OPTIONAL (ENABLE LATER)
      # =========================
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}

    volumes:
      - openclaw-data:/data

    ports:
      - "18789:18789"

    networks:
      - coolify
      - zynithic-networks

    command: ["bash", "/app/scripts/bootstrap.sh"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s


