version: "3.9"

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: openclaw
    restart: unless-stopped

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    environment:
      # ── Core ──────────────────────────────────────────────────────────────
      PORT: 18789
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=1024

      # ── LLM Provider ──────────────────────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}

      # ── Databases (optional — leave blank if not using external DBs) ───────
      REDIS_URL: ${REDIS_URL:-}
      MONGODB_URI: ${MONGODB_URI:-}
      DATABASE_URL: ${DATABASE_URL:-}

      # ── Persistent Storage paths (must match volume mount) ─────────────────
      OPENCLAW_STATE_DIR: /data/.openclaw
      OPENCLAW_WORKSPACE: /data/openclaw-workspace

      # ── Safety: disable Docker-in-Docker sandboxing ───────────────────────
      DOCKER_HOST: ""
      SANDBOX_CONTAINER: "false"

      # ── Token/context optimisation ────────────────────────────────────────
      AGENTS_DEFAULTS_BOOTSTRAP_MAX_CHARS: 3000
      AGENTS_DEFAULTS_CONTEXT_WINDOW_THRESHOLD: "0.5"

      # ── Loop control ──────────────────────────────────────────────────────
      MAX_ITERATIONS: 4
      MAX_TOOL_CALLS: 6

      # ── Public URL (set automatically by Coolify) ─────────────────────────
      BASE_URL: https://${SERVICE_FQDN_OPENCLAW}
      PUBLIC_URL: https://${SERVICE_FQDN_OPENCLAW}

      # ── File-watch fix for containers ────────────────────────────────────
      CHOKIDAR_USEPOLLING: "true"

      # ── Optional channels ─────────────────────────────────────────────────
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}

    volumes:
      - openclaw-data:/data

    # expose makes the port reachable by Traefik inside the Docker network
    # without publishing it directly to the host — this is the correct pattern for Coolify
    expose:
      - "18789"

    networks:
      - coolify

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  openclaw-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  coolify:
    external: true
